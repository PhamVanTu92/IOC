# ─────────────────────────────────────────────────────────────────────────────
# Redis config — IOC Platform
# ─────────────────────────────────────────────────────────────────────────────

# Persistence
appendonly yes
appendfsync everysec

# Memory
maxmemory 512mb
maxmemory-policy allkeys-lru

# Security (password set via command line --requirepass)
# protected-mode yes

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Disable dangerous commands in prod
# rename-command FLUSHALL ""
# rename-command FLUSHDB  ""
